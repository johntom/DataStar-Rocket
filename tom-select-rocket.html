<!--
  Rocket Tom Select Component
  ============================
  A Datastar Rocket web component wrapping Tom Select.

  Usage:
    <rocket-tom-select
      placeholder="Pick a fruit..."
      max-items="3"
      options='[{"value":"a","text":"Apple"}]'
      data-on:ts-change="$selectedFruit = evt.detail.value"
    ></rocket-tom-select>

  Props (data-props codec syntax):
    placeholder   - Placeholder text (string, default: "Select...")
    max-items     - Max selectable items (int, min 1, default: 1)
    options       - JSON string of [{value, text}] objects (string)
    value         - Current value, comma-separated for multi (string)
    allow-create  - Allow user to create new items (boolean, default: false)
    detail-field  - Comma-separated extra field names for multi-column dropdown (string)
    search-url    - Backend URL for remote search (string)
    check-options - Enable checkbox multi-select with Apply/Clear buttons (boolean, default: false)

  Emits:
    ts-change CustomEvent with detail.value (string)
    Listen via: data-on:ts-change="$mySignal = evt.detail.value"

  Note: options uses string codec (not json) to avoid Datastar signal proxy
  issues with arrays. The JSON is parsed inside the component script.
-->

<template data-rocket:rocket-tom-select
  data-props:placeholder="string|=Select..."
  data-props:max-items="int|min:1|=1"
  data-props:options="string|="
  data-props:value="string|="
  data-props:allow-create="boolean|=false"
  data-props:detail-field="string|="
  data-props:search-url="string|="
  data-props:check-options="boolean|=false"
  data-import:TomSelect__iife="https://cdn.jsdelivr.net/npm/tom-select@2.4.1/dist/js/tom-select.complete.min.js"
>
  <script>
    let tsInstance = null

    function parseOptions() {
      try {
        const raw = '' + ($$options || '')
        return raw ? JSON.parse(raw) : []
      } catch(e) {
        return []
      }
    }

    function buildConfig() {
      const opts = parseOptions()
      const config = {
        placeholder: '' + ($$placeholder || ''),
        maxItems: +($$maxItems || 1),
        maxOptions: null,
        create: !!($$allowCreate),
        plugins: {},
        onInitialize: function () {
          var v = '' + ($$value || '')
          if (v) {
            this.setValue(v.split(','), true)
          }
        },
        onChange: function (val) {
          try {
            var strVal = Array.isArray(val) ? val.join(',') : ('' + (val || ''))
            $$value = strVal
            el.dispatchEvent(new CustomEvent('ts-change', {
              detail: { value: strVal },
              bubbles: true,
              composed: true
            }))
          } catch(e) {
            console.error('[TomSelect onChange]', e)
          }
        }
      }

      if (!!($$checkOptions)) {
        config.maxItems = 50
        config.plugins.checkbox_options = {}
        config.plugins.remove_button = { title: 'Remove' }
        // Suppress onChange — Apply button will fire it
        config._realOnChange = config.onChange
        config.onChange = function () {}
      } else if (+($$maxItems || 1) > 1) {
        config.plugins.remove_button = { title: 'Remove' }
      }

      if (opts.length > 0) {
        config.options = opts
        config.labelField = 'text'
        config.valueField = 'value'
        config.searchField = ['text']
      }

      var df = '' + ($$detailField || '')
      if (df) {
        var fields = df.split(',').map(function(f){ return f.trim() })
        config.searchField = ['text'].concat(fields)
        config.render = {
          option: function(data, escape) {
            var html = '<div style="display:flex;gap:.5rem">'
              + '<span style="flex:1">' + escape(data.text) + '</span>'
            for (var i = 0; i < fields.length; i++) {
              html += '<span style="color:#888;font-size:.8em;min-width:5rem;text-align:right">' + escape(data[fields[i]] || '') + '</span>'
            }
            return html + '</div>'
          },
          item: function(data, escape) {
            var parts = [escape(data.text)]
            for (var i = 0; i < fields.length; i++) {
              if (data[fields[i]]) parts.push(escape(data[fields[i]]))
            }
            return '<div>' + parts.join(' · ') + '</div>'
          }
        }
      }

      var sUrl = '' + ($$searchUrl || '')
      if (sUrl) {
        config.load = function (query, callback) {
          if (!query.length) return callback()
          fetch(sUrl + '?q=' + encodeURIComponent(query))
            .then(function(res) { return res.json() })
            .then(function(data) { callback(data) })
            .catch(function() { callback() })
        }
        config.labelField = 'text'
        config.valueField = 'value'
        config.searchField = ['text']
      }

      return config
    }

    effect(function() {
      if (!$$selectEl || !TomSelect) return
      if (tsInstance) return
      var cfg = buildConfig()
      tsInstance = new TomSelect($$selectEl, cfg)
      // Append Apply / Clear buttons for checkbox mode
      if (cfg._realOnChange) {
        var fireChange = cfg._realOnChange
        var bar = document.createElement('div')
        bar.style.cssText = 'display:flex;gap:4px;padding:4px 6px;border-top:1px solid var(--clr-border,#ddd);'
        var applyBtn = document.createElement('button')
        applyBtn.type = 'button'
        applyBtn.textContent = 'Apply'
        applyBtn.style.cssText = 'flex:1;padding:2px 6px;font-size:11px;cursor:pointer;background:#4472c4;color:#fff;border:1px solid #3560a8;border-radius:3px;'
        var clearBtn = document.createElement('button')
        clearBtn.type = 'button'
        clearBtn.textContent = 'Clear'
        clearBtn.style.cssText = 'flex:1;padding:2px 6px;font-size:11px;cursor:pointer;background:var(--clr-bg,#f5f5f5);color:var(--clr-text,#333);border:1px solid var(--clr-border,#ccc);border-radius:3px;'
        var ts = tsInstance
        applyBtn.addEventListener('click', function (e) {
          e.stopPropagation()
          fireChange.call(ts, ts.getValue())
          ts.close()
        })
        clearBtn.addEventListener('click', function (e) {
          e.stopPropagation()
          ts.clear(true)
          fireChange.call(ts, '')
          ts.close()
        })
        bar.appendChild(applyBtn)
        bar.appendChild(clearBtn)
        tsInstance.dropdown.style.display = 'flex'
        tsInstance.dropdown.style.flexDirection = 'column'
        tsInstance.dropdown_content.style.maxHeight = '170px'
        tsInstance.dropdown_content.style.flex = '1'
        tsInstance.dropdown.appendChild(bar)
        tsInstance.close()
        tsInstance.blur()
      }
    })

    var prevOptionsStr = ''
    effect(function() {
      if (!tsInstance) return
      var optStr = '' + ($$options || '')
      if (optStr !== prevOptionsStr) {
        prevOptionsStr = optStr
        try {
          var parsed = optStr ? JSON.parse(optStr) : []
          tsInstance.clearOptions()
          tsInstance.addOptions(parsed)
          tsInstance.refreshOptions(false)
        } catch(e) {}
      }
    })

    var lastSyncedValue = ''
    effect(function() {
      if (!tsInstance) return
      var newVal = '' + ($$value || '')
      if (newVal !== lastSyncedValue) {
        lastSyncedValue = newVal
        if (newVal) {
          tsInstance.setValue(newVal.split(','), true)
        } else {
          tsInstance.clear(true)
        }
      }
    })

    onCleanup(function() {
      if (tsInstance) {
        tsInstance.destroy()
        tsInstance = null
      }
    })
  </script>

  <select data-ref="selectEl"></select>
</template>
